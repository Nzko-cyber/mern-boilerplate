name: CI/CD

on:
  push:
    branches: [main, master]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      PORT: 3000
      SESSION_SECRET: mern
      DATABASE_URL: mongodb://127.0.0.1:27017/mern
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Start API server
        run: npm run start:server &

      - name: Wait for API readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/tags > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time"
          exit 1

      - name: Create test user for API and E2E
        run: npx ts-node client/tests/support/setup/create-env.ts

      - name: Run API tests
        run: npm run test:api

      - name: Build production bundle
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Cleanup E2E test user
        if: always()
        run: npx ts-node client/tests/support/setup/delete-env.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          if-no-files-found: error
          retention-days: 14

  cd:
    name: Publish Artifact
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Create release-ready archive
        run: tar -czf web-dist.tar.gz dist

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-release
          path: web-dist.tar.gz
          if-no-files-found: error
          retention-days: 30
